name: Codeness
options:
  minimumXcodeGenVersion: 2.38.0
  defaultConfig: Debug
  xcodeVersion: "2700"
settings:
  base:
    SWIFT_VERSION: "6.4"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_STRICT_MEMORY_SAFETY: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    RUN_CLANG_STATIC_ANALYZER: YES
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MACOSX_DEPLOYMENT_TARGET: 15.0
    ARCHS: arm64
targets:
  CodenessCore:
    type: library.static
    platform: macOS
    sources:
      - Sources/CodenessCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ap.codeness.core
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
  Codeness:
    type: application
    platform: macOS
    sources:
      - Sources/CodenessApp
    dependencies:
      - target: CodenessCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ap.codeness
        PRODUCT_NAME: Codeness
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Codeness-Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W65292CD8T
  CodenessCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CodenessCoreTests
    dependencies:
      - target: CodenessCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ap.codeness.core.tests
        GENERATE_INFOPLIST_FILE: YES
  CodenessAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/CodenessAppTests
    dependencies:
      - target: Codeness
    hostApplication: Codeness
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ap.codeness.app.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W65292CD8T
schemes:
  Codeness:
    build:
      targets:
        Codeness: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CodenessCoreTests
        - CodenessAppTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  CodenessConcurrency:
    build:
      targets:
        CodenessCoreTests: test
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - CodenessCoreTests
        - CodenessAppTests
